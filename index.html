<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Cobranças Parceladas Inteligente</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f0f3f5;
            color: #2c3e50;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            color: #1a252f;
        }

        /* Área de Digitação */
        .input-area {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            position: relative;
        }

        .row-inputs {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-titulo, .input-valor, .input-parcelas {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            outline: none;
            transition: all 0.3s;
        }

        .input-valor, .input-parcelas {
            text-align: center;
        }

        .input-titulo:focus, .input-valor:focus, .input-parcelas:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        textarea {
            width: 100%;
            height: 110px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            font-size: 1.05rem;
            margin-bottom: 15px;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        button {
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-salvar {
            background-color: #2ecc71;
            color: white;
        }

        .btn-salvar:hover { background-color: #27ae60; }

        .btn-voz {
            background-color: #34495e;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
        }

        .btn-voz.escutando {
            background-color: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .status-voz {
            font-size: 0.85rem;
            color: #e74c3c;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 500;
            display: none;
        }

        /* Lista de Cobranças */
        .notas-lista {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nota-card {
            background: #fff;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 6px solid #e67e22; 
            animation: surgir 0.3s ease;
            transition: all 0.3s ease;
        }

        .nota-card.parcial { border-left-color: #f1c40f; background-color: #fefdf3;}
        .nota-card.pago { border-left-color: #2ecc71; background-color: #f4fbf7; }

        @keyframes surgir {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nota-header-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .nota-titulo-exibicao {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a252f;
        }

        /* Badges */
        .badge-status {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .status-pendente { background-color: #fdebd0; color: #b7950b; }
        .status-parcial { background-color: #fef9e7; color: #b7950b; }
        .status-pago { background-color: #d4efdf; color: #196f3d; }

        .nota-texto {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Parcelas Dentro do Card */
        .parcelas-container {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 8px;
            border: 1px solid #e2e8f0;
        }

        .parcela-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            font-weight: 500;
            font-size: 0.85rem;
            height: 38px;
        }

        .parcela-esquerda {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .parcela-esquerda input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .parcela-texto-valor {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .btn-acao-parcela {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-acao-parcela:hover {
            background: #e2e8f0;
        }

        .input-inline-parcela {
            width: 70px;
            border: 2px solid #3498db;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 0.8rem;
            font-weight: bold;
            outline: none;
            text-align: right;
        }

        .nota-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #95a5a6;
            border-top: 1px solid #f8f9fa;
            padding-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .botoes-card {
            display: flex;
            gap: 5px;
        }

        .btn-card {
            background: none;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn-zap { color: #2ecc71; }
        .btn-zap:hover { background: #e8f8f0; }

        .btn-editar { color: #3498db; }
        .btn-editar:hover { background: #ebf5fb; }

        .btn-excluir { color: #e74c3c; }
        .btn-excluir:hover { background: #fdedec; }

        .dica-comando {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>📝 Cobranças Inteligentes</h1>
        </header>

        <div class="input-area">
            <div id="statusVoz" class="status-voz">🎙️ Ouvindo... Fale agora.</div>
            
            <div class="row-inputs">
                <input type="text" id="notaTitulo" class="input-titulo" placeholder="Cliente ou Serviço...">
                <input type="number" id="notaValor" class="input-valor" min="0" step="0.01" placeholder="Valor R$" oninput="calcularParcelasAutomatico()">
                <input type="number" id="notaParcelas" class="input-parcelas" min="1" value="1" placeholder="Parc." oninput="calcularParcelasAutomatico()">
            </div>
            
            <textarea id="notaTexto" placeholder="Os detalhes do parcelamento aparecerão aqui automaticamente conforme você digita o valor..."></textarea>
            
            <div class="action-buttons">
                <button onclick="salvarNota()" class="btn-salvar" id="btnSalvarPrincipal">💾 Registrar Cobrança</button>
                <button onclick="alternarVoz()" class="btn-voz" id="btnVoz" title="Ativar Voz">🎙️</button>
            </div>
            <div class="dica-comando">Dica de voz: fale <b>"salvar anotação"</b> ou <b>"limpar tudo"</b>.</div>
        </div>

        <div id="notasContainer" class="notas-lista"></div>
    </div>

    <script>
        // --- FUNÇÃO DE CÁLCULO AUTOMÁTICO ---
        function calcularParcelasAutomatico() {
            if (idEdicaoAtual !== null && document.activeElement.id === "notaTexto") return;

            const valorTotal = parseFloat(document.getElementById("notaValor").value) || 0;
            const qtdParcelas = parseInt(document.getElementById("notaParcelas").value) || 1;
            const campoTexto = document.getElementById("notaTexto");

            if (valorTotal <= 0) {
                campoTexto.value = "";
                return;
            }

            const valorParcela = (valorTotal / qtdParcelas).toFixed(2);
            
            if (qtdParcelas === 1) {
                campoTexto.value = `Pagamento à vista no valor de R$ ${valorTotal.toFixed(2)}.`;
            } else {
                campoTexto.value = `Valor Total: R$ ${valorTotal.toFixed(2)}\nParcelado em ${qtdParcelas}x de R$ ${valorParcela} cada parcela.`;
            }
        }

        // --- BANCO DE DADOS INDEXEDDB ---
        let db;
        const request = indexedDB.open("BancoCobrancasCalculadas", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("cobrancas", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            renderizarNotas();
        };

        request.onerror = function() {
            alert("Erro ao abrir o banco de dados no celular.");
        };

        let idEdicaoAtual = null;

        // --- SISTEMA DE RECONHECIMENTO DE VOZ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconhecimento = null;
        let escutando = false;

        if (SpeechRecognition) {
            reconhecimento = new SpeechRecognition();
            reconhecimento.continuous = true; 
            reconhecimento.lang = 'pt-BR';

            reconhecimento.onresult = function(event) {
                const resultadoAtual = event.results[event.results.length - 1][0].transcript.trim();
                const resultadoMinusculo = resultadoAtual.toLowerCase();
                const campoTexto = document.getElementById("notaTexto");

                if (resultadoMinusculo === "salvar anotação" || resultadoMinusculo === "salvar nota") {
                    salvarNota();
                    pararVoz();
                    return;
                }
                
                if (resultadoMinusculo === "limpar tudo" || resultadoMinusculo === "apagar tudo") {
                    limparFormulario();
                    return;
                }

                if (campoTexto.value !== "") {
                    campoTexto.value += " " + resultadoAtual;
                } else {
                    campoTexto.value = resultadoAtual;
                }
            };

            reconhecimento.onend = function() {
                if (escutando) reconhecimento.start(); 
            };
        }

        function alternarVoz() {
            if (!SpeechRecognition) { alert("Voz não suportada."); return; }
            if (!escutando) {
                reconhecimento.start();
                escutando = true;
                document.getElementById("btnVoz").classList.add("escutando");
                document.getElementById("statusVoz").style.display = "block";
            } else {
                pararVoz();
            }
        }

        function pararVoz() {
            if (reconhecimento) {
                escutando = false;
                reconhecimento.stop();
                document.getElementById("btnVoz").classList.remove("escutando");
                document.getElementById("statusVoz").style.display = "none";
            }
        }

        function limparFormulario() {
            document.getElementById("notaTitulo").value = "";
            document.getElementById("notaValor").value = "";
            document.getElementById("notaParcelas").value = "1";
            document.getElementById("notaTexto").value = "";
            idEdicaoAtual = null;
            document.getElementById("btnSalvarPrincipal").innerHTML = "💾 Registrar Cobrança";
        }

        // --- OPERAÇÕES CRUD ---

        function salvarNota() {
            const campoTitulo = document.getElementById("notaTitulo");
            const campoValor = document.getElementById("notaValor");
            const campoParcelas = document.getElementById("notaParcelas");
            const campoTexto = document.getElementById("notaTexto");
            
            const titulo = campoTitulo.value.trim();
            const valor = parseFloat(campoValor.value) || 0;
            const qtdParcelas = parseInt(campoParcelas.value) || 1;
            const texto = campoTexto.value.trim();

            if (titulo === "" || texto === "") {
                alert("Preencha o cliente e os dados antes de salvar!");
                return;
            }

            const agora = new Date();
            const dataHoraFormatada = agora.toLocaleDateString('pt-BR') + ' às ' + 
                                     agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const transacao = db.transaction(["cobrancas"], "readwrite");
            const store = transacao.objectStore("cobrancas");

            if (idEdicaoAtual !== null) {
                const pedidoObter = store.get(idEdicaoAtual);
                pedidoObter.onsuccess = function() {
                    const cobranca = pedidoObter.result;
                    cobranca.titulo = titulo;
                    cobranca.valor = valor;
                    cobranca.texto = texto;
                    if (!cobranca.valoresCustomizados || cobranca.valoresCustomizados.length !== qtdParcelas) {
                        const valorCada = (valor / qtdParcelas).toFixed(2);
                        cobranca.valoresCustomizados = Array(qtdParcelas).fill(valorCada);
                    }
                    if (cobranca.historicoParcelas.length !== qtdParcelas) {
                        cobranca.historicoParcelas = Array(qtdParcelas).fill(false);
                    }
                    store.put(cobranca);
                };
            } else {
                const listaParcelas = Array(qtdParcelas).fill(false);
                const valorCada = (valor / qtdParcelas).toFixed(2);
                const valoresCustomizados = Array(qtdParcelas).fill(valorCada);

                const novaCobranca = { 
                    titulo: titulo, 
                    valor: valor,
                    texto: texto, 
                    dataHora: "Registrado: " + dataHoraFormatada,
                    historicoParcelas: listaParcelas,
                    valoresCustomizados: valoresCustomizados
                };
                store.add(novaCobranca);
            }

            transacao.oncomplete = function() {
                limparFormulario();
                renderizarNotas();
            };
        }

        function renderizarNotas() {
            const container = document.getElementById("notasContainer");
            container.innerHTML = "";

            const tx = db.transaction("cobrancas", "readonly");
            const store = tx.objectStore("cobrancas");
            const cursorRequest = store.openCursor(null, "prev"); 

            let temCobrancas = false;

            cursorRequest.onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    temCobrancas = true;
                    const cobranca = cursor.value;

                    const totalParcelas = cobranca.historicoParcelas.length;
                    
                    if (!cobranca.valoresCustomizados || cobranca.valoresCustomizados.length !== totalParcelas) {
                        const valorCada = (cobranca.valor / totalParcelas).toFixed(2);
                        cobranca.valoresCustomizados = Array(totalParcelas).fill(valorCada);
                    }

                    let pagas = 0;
                    let totalPago = 0;
                    let novoValorTotalCalculado = 0;

                    for(let i = 0; i < totalParcelas; i++) {
                        const vParcela = parseFloat(cobranca.valoresCustomizados[i]) || 0;
                        novoValorTotalCalculado += vParcela;
                        if(cobranca.historicoParcelas[i] === true) {
                            pagas++;
                            totalPago += vParcela;
                        }
                    }
                    
                    let saldoDevedor = novoValorTotalCalculado - totalPago;
                    if (saldoDevedor < 0) saldoDevedor = 0;

                    let classeCard = "";
                    let badgeHTML = "";
                    let statusTextoZap = "🔴 Pendente";

                    if (pagas === 0) {
                        classeCard = "";
                        badgeHTML = `<span class="badge-status status-pendente">🔴 Pendente</span>`;
                    } else if (pagas < totalParcelas) {
                        classeCard = "parcial";
                        badgeHTML = `<span class="badge-status status-parcial">🟡 Parcial (${pagas}/${totalParcelas})</span>`;
                        statusTextoZap = `🟡 Parcial (${pagas} de ${totalParcelas} pagas)`;
                    } else {
                        classeCard = "pago";
                        badgeHTML = `<span class="badge-status status-pago">🟢 PAGO</span>`;
                        statusTextoZap = "🟢 Totalmente Pago";
                    }

                    let parcelasHTML = "";
                    for (let i = 0; i < totalParcelas; i++) {
                        const checado = cobranca.historicoParcelas[i] ? "checked" : "";
                        const valorExibicao = cobranca.valoresCustomizados[i];
                        parcelasHTML += `
                            <div class="parcela-item">
                                <div class="parcela-esquerda">
                                    <input type="checkbox" ${checado} onchange="alternarParcela(${cobranca.id}, ${i}, this.checked)">
                                    <span class="parcela-texto-valor" id="txt-wrap-${cobranca.id}-${i}">
                                        Parc. ${i + 1} (R$ ${valorExibicao})
                                    </span>
                                </div>
                                <button class="btn-acao-parcela" id="btn-acao-${cobranca.id}-${i}" onclick="editarValorInline(${cobranca.id}, ${i}, '${valorExibicao}')" title="Editar valor">✏️</button>
                            </div>
                        `;
                    }

                    let textoExibicao = cobranca.texto;
                    if(totalPago > 0 || Math.abs(cobranca.valor - novoValorTotalCalculado) > 0.01) {
                        textoExibicao += `\n\n[Balancete Atualizado]\n💰 Novo Total: R$ ${novoValorTotalCalculado.toFixed(2)}\n✅ Total Pago: R$ ${totalPago.toFixed(2)}\n📉 Saldo Restante: R$ ${saldoDevedor.toFixed(2)}`;
                    }

                    const card = document.createElement("div");
                    card.className = `nota-card ${classeCard}`;
                    
                    card.innerHTML = `
                        <div class="nota-header-card">
                            <div class="nota-titulo-exibicao">${escapeHTML(cobranca.titulo)}</div>
                            ${badgeHTML}
                        </div>
                        <div class="nota-texto">${escapeHTML(textoExibicao)}</div>
                        
                        <div class="parcelas-container">
                            ${parcelasHTML}
                        </div>

                        <div class="nota-footer">
                            <span>📅 ${cobranca.dataHora}</span>
                            <div class="botoes-card">
                                <button class="btn-card btn-zap" onclick="compartilharWhatsApp(\`${escapeJS(cobranca.titulo)}\`, \`${escapeJS(textoExibicao)}\`, '${statusTextoZap}')">🟢 Zap</button>
                                <button class="btn-card btn-editar" onclick="prepararEdicao(${cobranca.id}, \`${escapeJS(cobranca.titulo)}\`, ${cobranca.valor}, ${totalParcelas}, \`${escapeJS(cobranca.texto)}\`)">Editar</button>
                                <button class="btn-card btn-excluir" onclick="excluirNota(${cobranca.id})">Excluir</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                    cursor.continue();
                } else if (!temCobrancas) {
                    container.innerHTML = `<p style="text-align: center; color: #7f8c8d;">Nenhuma cobrança registrada.</p>`;
                }
            };
        }

        // --- FUNÇÃO DE EDIÇÃO ALINHADA SEM QUEBRAR O LAYOUT ---
        function editarValorInline(idCobranca, indiceParcela, valorAtual) {
            const txtWrap = document.getElementById(`txt-wrap-${idCobranca}-${indiceParcela}`);
            const btnAcao = document.getElementById(`btn-acao-${idCobranca}-${indiceParcela}`);
            if(!txtWrap || !btnAcao) return;

            // Troca o ícone do botão para o check de confirmação
            btnAcao.innerHTML = "✅";
            btnAcao.title = "Confirmar valor";

            // Transforma o texto em um input fixo
            txtWrap.innerHTML = `Parc. ${indiceParcela + 1} R$ `;
            
            const input = document.createElement("input");
            input.type = "number";
            input.step = "0.01";
            input.className = "input-inline-parcela";
            input.value = valorAtual;
            txtWrap.appendChild(input);

            let jaSalvou = false;

            const salvarMudancaInline = () => {
                if (jaSalvou) return;
                jaSalvou = true;

                const novoValor = parseFloat(input.value) || 0;
                
                const tx = db.transaction(["cobrancas"], "readwrite");
                const store = tx.objectStore("cobrancas");
                const pedidoObter = store.get(idCobranca);

                pedidoObter.onsuccess = function() {
                    const cobranca = pedidoObter.result;
                    cobranca.valoresCustomizados[indiceParcela] = novoValor.toFixed(2);
                    
                    let novaSomaTotal = 0;
                    cobranca.valoresCustomizados.forEach(v => novaSomaTotal += parseFloat(v) || 0);
                    cobranca.valor = novaSomaTotal;

                    store.put(cobranca);
                };

                tx.oncomplete = function() {
                    renderizarNotas();
                };
            };

            // Eventos de gatilho para salvar com segurança
            btnAcao.onclick = function(e) {
                e.stopPropagation();
                salvarMudancaInline();
            };

            input.onblur = salvarMudancaInline;
            input.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    salvarMudancaInline();
                }
            };

            input.focus();
            input.select();
        }

        function compartilharWhatsApp(titulo, texto, status) {
            const mensagemFormatada = `*Cobrança:* ${titulo}\n\n${texto}\n\n*Status Atual:* ${status}`;
            const urlZap = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagemFormatada)}`;
            window.open(urlZap, '_blank');
        }

        function alternarParcela(idCobrança, indiceParcela, valorChecado) {
            const tx = db.transaction(["cobrancas"], "readwrite");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobrança);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                cobranca.historicoParcelas[indiceParcela] = valorChecado;
                store.put(cobranca);
            };

            tx.oncomplete = function() {
                renderizarNotas();
            };
        }

        function prepararEdicao(id, tituloOriginal, valorOriginal, qtdParcelas, textoOriginal) {
            idEdicaoAtual = id;
            document.getElementById("notaTitulo").value = tituloOriginal;
            document.getElementById("notaValor").value = valorOriginal > 0 ? valorOriginal : "";
            document.getElementById("notaParcelas").value = qtdParcelas;
            document.getElementById("notaTexto").value = textoOriginal;
            document.getElementById("btnSalvarPrincipal").innerHTML = "🔄 Atualizar Dados";
            document.getElementById("notaTitulo").focus();
        }

        function excluirNota(id) {
            if (confirm("Remover essa cobrança permanentemente?")) {
                const tx = db.transaction(["cobrancas"], "readwrite");
                tx.objectStore("cobrancas").delete(id);
                tx.oncomplete = function() {
                    if(idEdicaoAtual === id) limparFormulario();
                    renderizarNotas();
                };
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function escapeJS(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }
    </script>
</body>
</html>
