<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Agenda do Allan</title>
    <style>
        :root {
            --bg: #0d0d15;
            --surface: #161622;
            --surface2: #1e1e2e;
            --surface3: #282840;
            --text: #eeeef5;
            --text2: #9999aa;
            --text3: #555568;
            --accent: #7c6ff7;
            --accent2: #a99bfa;
            --green: #00c896;
            --red: #f07070;
            --blue: #5b9cf5;
            --orange: #f5b84d;
            --pink: #f070a0;
            --yellow: #f5c842;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --radius: 18px;
            --radius-sm: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            width: 100%;
            max-width: 440px;
            padding: 0 14px;
            padding-bottom: calc(90px + var(--safe-bottom));
            min-height: 100vh;
        }

        .header {
            padding: 20px 4px 14px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg);
        }
        .header-row { display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #7c6ff7, #a99bfa);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; border: 2px solid rgba(255,255,255,0.1);
        }
        .header-title { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
        .header-subtitle { font-size: 11px; color: var(--text2); font-weight: 500; }
        .clock {
            display: flex; align-items: center; gap: 3px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 25px; padding: 8px 14px;
        }
        .clock-time {
            font-size: 18px; font-weight: 700;
            font-family: 'SF Mono', 'Courier New', monospace; color: var(--accent2);
        }
        .clock-sec {
            font-size: 10px; color: var(--text3);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        /* Alerta de hoje */
        .today-alert {
            background: var(--surface); border-radius: var(--radius);
            padding: 14px 16px; margin: 6px 0 14px; border: 1px solid rgba(245,200,66,0.3);
            display: none; align-items: center; gap: 12px; cursor: pointer;
        }
        .today-alert.show { display: flex; }
        .today-alert.all-done { border-color: rgba(0,200,150,0.3); }
        .today-alert-icon { font-size: 26px; flex-shrink: 0; }
        .today-alert-info { flex: 1; min-width: 0; }
        .today-alert-title { font-weight: 700; font-size: 13px; color: var(--yellow); }
        .today-alert.all-done .today-alert-title { color: var(--green); }
        .today-alert-text { font-size: 11px; color: var(--text2); margin-top: 1px; }
        .today-alert-badge {
            background: rgba(245,200,66,0.2); color: var(--yellow); font-weight: 700;
            font-size: 14px; min-width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .today-alert.all-done .today-alert-badge { background: rgba(0,200,150,0.2); color: var(--green); }
        .today-alert-btn {
            padding: 8px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; border: 1px solid rgba(245,200,66,0.4);
            background: rgba(245,200,66,0.1); color: var(--yellow);
            font-family: inherit; white-space: nowrap; transition: all 0.15s;
        }
        .today-alert-btn:active { transform: scale(0.95); background: rgba(245,200,66,0.2); }
        .today-alert.all-done .today-alert-btn { display: none; }

        /* Modal de alarme */
        .alarm-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 35;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .alarm-modal.open { opacity: 1; pointer-events: auto; }
        .alarm-dialog {
            background: var(--surface); border-radius: var(--radius);
            padding: 22px 20px; width: 90%; max-width: 360px;
            border: 1px solid var(--border); text-align: center;
        }
        .alarm-dialog h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
        .alarm-dialog .alarm-date { font-size: 13px; color: var(--accent2); font-weight: 600; margin-bottom: 16px; }
        .alarm-dialog .alarm-tasks { text-align: left; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
        .alarm-dialog .alarm-task-item {
            padding: 8px 10px; border-radius: 8px; font-size: 13px;
            background: var(--surface2); margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
        }
        .alarm-dialog .alarm-task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .alarm-dialog .alarm-actions { display: flex; gap: 8px; }
        .alarm-dialog .alarm-actions .btn { flex: 1; }

        .calendar {
            background: var(--surface); border-radius: var(--radius);
            padding: 16px; margin: 6px 0 14px; border: 1px solid var(--border);
        }
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .calendar-month { font-weight: 800; font-size: 17px; color: #fff; }
        .calendar-nav {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--surface2); border: 1px solid var(--border2);
            color: #fff; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 15px; font-weight: 700;
        }
        .calendar-nav:active { background: var(--accent); transform: scale(0.9); }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 6px; }
        .calendar-weekday { text-align: center; font-size: 11px; color: #b0b0c0; font-weight: 700; padding: 5px 0; }
        .calendar-dates { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .calendar-date {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; position: relative; color: #e0e0e8;
        }
        .calendar-date:active { transform: scale(0.88); }
        .calendar-date.other { color: #4a4a5a; opacity: 0.5; }
        .calendar-date.today {
            background: var(--accent); color: #fff; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 16px rgba(124,111,247,0.3);
        }
        .calendar-date.selected {
            outline: 3px solid var(--accent2); outline-offset: -2px;
            background: rgba(124,111,247,0.2); font-weight: 700;
        }
        .calendar-date.today.selected { outline-color: #fff; background: var(--accent); }
        .calendar-date.has-task::after {
            content: '📌'; position: absolute; bottom: 1px; right: 2px; font-size: 9px; line-height: 1;
        }
        .calendar-date.today.has-task::after { content: '📍'; font-size: 10px; }

        .filter-info {
            background: var(--surface); border-radius: var(--radius-sm);
            padding: 12px 14px; margin-bottom: 14px; text-align: center;
            border: 1px solid var(--accent); display: none;
        }
        .filter-info.show { display: block; }
        .filter-info .date-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; }
        .filter-info .date-value { font-size: 18px; font-weight: 800; color: #fff; }
        .filter-info .clear-btn {
            display: inline-block; margin-top: 6px; padding: 5px 12px;
            border-radius: 15px; font-size: 10px; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border2); background: var(--surface2);
            color: var(--text2); font-family: inherit;
        }

        .progress-card {
            display: flex; align-items: center; gap: 14px; padding: 16px;
            background: var(--surface); border-radius: var(--radius);
            margin-bottom: 14px; border: 1px solid var(--border);
        }
        .progress-ring { position: relative; width: 55px; height: 55px; flex-shrink: 0; }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: var(--surface3); stroke-width: 5; }
        .progress-ring-fill {
            fill: none; stroke: var(--accent2); stroke-width: 5;
            stroke-linecap: round; transition: stroke-dashoffset 0.5s ease;
        }
        .progress-ring-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); font-size: 15px; font-weight: 800; color: #fff;
        }
        .progress-info-title { font-weight: 700; font-size: 14px; }
        .progress-info-sub { font-size: 11px; color: var(--text2); }

        .section-title {
            font-size: 11px; font-weight: 700; color: #b0b0c0;
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; padding-left: 4px;
        }
        .task-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
        .task {
            display: flex; align-items: center; gap: 10px; padding: 14px 15px;
            background: var(--surface); border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .task:active { background: var(--surface2); }
        .task.done { opacity: 0.5; }
        .task.done .task-name { text-decoration: line-through; color: var(--text3); }
        .task.today-task { border-color: rgba(245,200,66,0.35); }
        .task.today-task::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: #f5c842; border-radius: 0 3px 3px 0;
        }
        .task-check {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2.5px solid var(--border2); display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700;
            background: var(--surface2);
        }
        .task.done .task-check {
            background: var(--green); border-color: var(--green); color: #000;
        }
        .task-body { flex: 1; min-width: 0; }
        .task-name { font-weight: 600; font-size: 14px; }
        .task-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; font-size: 10px; color: var(--text2); }
        .task-meta .date-highlight { color: var(--accent2); font-weight: 600; }
        .task-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .dot-trabalho { background: var(--blue); }
        .dot-estudo { background: #f07070; }
        .dot-exercício { background: var(--green); }
        .dot-pessoal { background: var(--pink); }
        .task-actions { display: flex; gap: 3px; flex-shrink: 0; }
        .task-btn {
            width: 30px; height: 30px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; background: var(--surface2); color: var(--text2);
        }
        .task-btn.del:active { background: rgba(240,112,112,0.15); color: var(--red); }

        .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
        .empty-icon { font-size: 48px; margin-bottom: 8px; opacity: 0.3; }
        .empty-text { font-size: 13px; }

        .fab {
            position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%); width: 54px; height: 54px; border-radius: 50%;
            background: linear-gradient(135deg, #7c6ff7, #a99bfa); border: none;
            color: #fff; font-size: 26px; cursor: pointer; z-index: 20;
            box-shadow: 0 8px 30px rgba(124,111,247,0.4);
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .fab:active { transform: translateX(-50%) scale(0.9); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 30; display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--surface); border-radius: 22px 22px 0 0;
            padding: 22px 18px calc(22px + var(--safe-bottom));
            width: 100%; max-width: 440px; transform: translateY(100%);
            transition: transform 0.3s ease; border: 1px solid var(--border);
            border-bottom: none; max-height: 85vh; overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: translateY(0); }
        .modal-handle {
            width: 32px; height: 3px; background: var(--surface3);
            border-radius: 2px; margin: 0 auto 18px;
        }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; text-align: center; }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block; font-size: 10px; font-weight: 700; color: #b0b0c0;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
        }
        .form-input {
            width: 100%; padding: 12px 14px; background: var(--surface2);
            border: 2px solid var(--border); border-radius: 10px; color: #fff;
            font-size: 15px; font-family: inherit; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text3); }

        /* Toggle alarme */
        .alarm-toggle {
            display: flex; align-items: center; gap: 10px; padding: 10px 0;
        }
        .alarm-toggle-label { font-size: 13px; color: var(--text); font-weight: 500; }
        .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--surface3); border-radius: 24px; transition: 0.2s;
        }
        .toggle-slider:before {
            content: ""; position: absolute; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s;
        }
        input:checked + .toggle-slider { background: var(--accent); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        .mini-cal { background: var(--surface2); border-radius: 12px; padding: 12px; border: 1px solid var(--border); }
        .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .mini-cal-month { font-weight: 700; font-size: 14px; color: #fff; }
        .mini-cal-nav {
            width: 28px; height: 28px; border-radius: 50%; background: var(--surface3);
            border: 1px solid var(--border2); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
        }
        .mini-cal-nav:active { background: var(--accent); transform: scale(0.9); }
        .mini-cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 4px; }
        .mini-cal-day { text-align: center; font-size: 10px; color: #b0b0c0; font-weight: 700; padding: 4px 0; }
        .mini-cal-dates { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .mini-cal-date {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.1s; color: #e0e0e8;
        }
        .mini-cal-date:active { transform: scale(0.85); }
        .mini-cal-date.other { color: #4a4a5a; opacity: 0.4; }
        .mini-cal-date.today { background: var(--accent); color: #fff; font-weight: 800; }
        .mini-cal-date.sel {
            background: rgba(124,111,247,0.25); outline: 2.5px solid var(--accent2);
            outline-offset: -2px; font-weight: 700;
        }
        .mini-cal-date.today.sel { outline-color: #fff; background: var(--accent); }
        .mini-cal-selected {
            text-align: center; margin-top: 10px; font-size: 11px; color: var(--accent2);
            padding: 6px; background: rgba(124,111,247,0.05); border-radius: 8px;
            min-height: 30px; display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap; gap: 4px; font-weight: 600;
        }
        .mini-cal-tag {
            background: rgba(124,111,247,0.15); color: #fff; padding: 4px 9px;
            border-radius: 12px; font-size: 10px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .mini-cal-tag .remove { cursor: pointer; font-size: 12px; opacity: 0.6; }
        .mini-cal-tag .remove:active { opacity: 1; }

        .chips { display: flex; flex-wrap: wrap; gap: 7px; }
        .chip {
            padding: 9px 14px; border-radius: 18px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: 2px solid transparent; background: var(--surface2);
            color: var(--text2);
        }
        .chip.active { border-color: var(--accent); color: #fff; background: rgba(124,111,247,0.1); }
        .chip.work { color: var(--blue); }
        .chip.work.active { border-color: var(--blue); }
        .chip.study { color: #f07070; }
        .chip.study.active { border-color: #f07070; }
        .chip.exercise { color: var(--green); }
        .chip.exercise.active { border-color: var(--green); }
        .chip.personal { color: var(--pink); }
        .chip.personal.active { border-color: var(--pink); }

        .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 13px; border-radius: 12px; font-size: 14px;
            font-weight: 600; cursor: pointer; border: none; font-family: inherit;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

        .clear-btn {
            display: block; margin: 0 auto 18px; padding: 10px 20px;
            border-radius: 22px; font-size: 11px; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border2); background: var(--surface);
            color: var(--text2); font-family: inherit;
        }
        .clear-btn:active { background: rgba(240,112,112,0.1); color: var(--red); }

        .toast {
            position: fixed; top: 16px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #fff; padding: 10px 20px;
            border-radius: 25px; font-size: 12px; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 50;
            transition: transform 0.35s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Indicador de salvamento */
        .save-indicator {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: var(--green); font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
        }
        .save-indicator.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-row">
                <div class="header-left">
                    <div class="header-avatar">📋</div>
                    <div>
                        <div class="header-title">Agenda do Allan</div>
                        <div class="header-subtitle" id="headerDate"></div>
                    </div>
                </div>
                <div class="clock">
                    <span class="clock-time" id="clockTime">00:00</span>
                    <span class="clock-sec" id="clockSec">00</span>
                </div>
            </div>
        </div>

        <div class="today-alert" id="todayAlert">
            <div class="today-alert-icon" id="todayAlertIcon">🔔</div>
            <div class="today-alert-info">
                <div class="today-alert-title" id="todayAlertTitle">Atividades de hoje!</div>
                <div class="today-alert-text" id="todayAlertText"></div>
            </div>
            <div class="today-alert-badge" id="todayAlertBadge">0</div>
            <button class="today-alert-btn" id="todayAlertBtn">🔔 Alarmes</button>
        </div>

        <div class="calendar">
            <div class="calendar-header">
                <button class="calendar-nav" id="calPrev">◀</button>
                <div class="calendar-month" id="calMonth"></div>
                <button class="calendar-nav" id="calNext">▶</button>
            </div>
            <div class="calendar-weekdays" id="calWeekdays"></div>
            <div class="calendar-dates" id="calDates"></div>
        </div>

        <div class="filter-info" id="filterInfo">
            <div class="date-label">📅 Data selecionada</div>
            <div class="date-value" id="filterDateValue"></div>
            <button class="clear-btn" id="clearFilterBtn">✕ Mostrar todas</button>
        </div>

        <div class="progress-card">
            <div class="progress-ring">
                <svg width="55" height="55" viewBox="0 0 55 55">
                    <circle class="progress-ring-bg" cx="27.5" cy="27.5" r="23"/>
                    <circle class="progress-ring-fill" id="progressFill" cx="27.5" cy="27.5" r="23"/>
                </svg>
                <div class="progress-ring-text" id="progressPct">0%</div>
            </div>
            <div>
                <div class="progress-info-title" id="progressTitle">Selecione uma data</div>
                <div class="progress-info-sub" id="progressSub">Toque em um dia no calendário</div>
            </div>
        </div>

        <div class="section-title">📌 Atividades</div>
        <div class="task-list" id="taskList"></div>
        <button class="clear-btn" id="clearDone">🧹 Limpar concluídas</button>
    </div>

    <button class="fab" id="fab">+</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalSheet">
            <div class="modal-handle"></div>
            <div class="modal-title" id="modalTitle">Nova Atividade</div>
            <div id="editBadge" style="display:none;text-align:center;margin-bottom:12px;font-size:10px;color:var(--accent2);font-weight:600;background:rgba(124,111,247,0.1);padding:5px 12px;border-radius:18px;">✏️ Editando</div>
            <div class="form-group">
                <label class="form-label">📝 O que vai fazer?</label>
                <input type="text" class="form-input" id="inputName" placeholder="Ex: Academia, reunião..." autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">📅 Selecione os dias</label>
                <div class="mini-cal">
                    <div class="mini-cal-header">
                        <button class="mini-cal-nav" id="miniCalPrev">◀</button>
                        <div class="mini-cal-month" id="miniCalMonth"></div>
                        <button class="mini-cal-nav" id="miniCalNext">▶</button>
                    </div>
                    <div class="mini-cal-days" id="miniCalDays"></div>
                    <div class="mini-cal-dates" id="miniCalDates"></div>
                    <div class="mini-cal-selected" id="miniCalSelected">📅 Nenhum dia selecionado</div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">⏰ Alarme</label>
                <div class="alarm-toggle">
                    <span class="alarm-toggle-label">Ativar alarme para esta atividade</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="alarmToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">📂 Categoria</label>
                <div class="chips" id="chips">
                    <div class="chip work" data-cat="trabalho">💼 Trabalho</div>
                    <div class="chip study" data-cat="estudo">📚 Estudo</div>
                    <div class="chip exercise" data-cat="exercício">🏃 Exercício</div>
                    <div class="chip personal" data-cat="pessoal">👤 Pessoal</div>
                </div>
            </div>
            <div class="modal-btns">
                <button class="btn btn-secondary" id="btnCancel">Cancelar</button>
                <button class="btn btn-primary" id="btnSave">💾 Salvar</button>
            </div>
        </div>
    </div>

    <div class="alarm-modal" id="alarmModal">
        <div class="alarm-dialog">
            <h3>⏰ Alarmes para Hoje</h3>
            <div class="alarm-date" id="alarmDate"></div>
            <div class="alarm-tasks" id="alarmTasks"></div>
            <div class="alarm-actions">
                <button class="btn btn-primary" id="alarmDismiss">OK, entendi!</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="save-indicator" id="saveIndicator">💾 Salvo!</div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        const STORAGE_KEY = 'agenda_allan_v5';

        // ==================== ESTADO ====================
        let tasks = [];
        let dateFilter = null;
        let editId = null;
        let category = 'trabalho';
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth();
        let miniYear = new Date().getFullYear();
        let miniMonth = new Date().getMonth();
        let miniDates = [];
        let alarmEnabled = false;
        let alarmsTriggered = {};

        // ==================== UTILITÁRIOS ====================
        function today() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function uid() {
            return 't_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        // ==================== PERSISTÊNCIA ====================
        function saveTasks() {
            try {
                const json = JSON.stringify(tasks);
                localStorage.setItem(STORAGE_KEY, json);
                // Verificar se salvou corretamente
                const verify = localStorage.getItem(STORAGE_KEY);
                if (verify === json) {
                    showSaveIndicator();
                    console.log('✅ Dados salvos com sucesso! ' + tasks.length + ' tarefas');
                } else {
                    console.error('❌ Erro na verificação do salvamento');
                }
            } catch (e) {
                console.error('❌ Erro ao salvar:', e);
                // Tentar limpar storage se estiver cheio
                if (e.name === 'QuotaExceededError') {
                    toast('⚠️ Armazenamento cheio! Limpe dados antigos');
                }
            }
        }

        function loadTasks() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed)) {
                        tasks = parsed;
                        console.log('📂 Dados carregados: ' + tasks.length + ' tarefas');
                    } else {
                        tasks = [];
                        console.log('📂 Dados inválidos, iniciando vazio');
                    }
                } else {
                    console.log('📂 Nenhum dado salvo, criando exemplos');
                    tasks = createSampleTasks();
                    saveTasks();
                }
                // Migrar dados antigos
                let migrated = false;
                tasks.forEach(t => {
                    if (t.date && !t.dates) {
                        t.dates = [t.date];
                        delete t.date;
                        migrated = true;
                    }
                    if (!t.dates) {
                        t.dates = [today()];
                        migrated = true;
                    }
                    if (t.alarm === undefined) {
                        t.alarm = false;
                        migrated = true;
                    }
                });
                if (migrated) {
                    console.log('📂 Dados migrados para nova versão');
                    saveTasks();
                }
            } catch (e) {
                console.error('❌ Erro ao carregar:', e);
                tasks = createSampleTasks();
                saveTasks();
            }
        }

        function createSampleTasks() {
            const t = today();
            return [
                { id: uid(), name: 'Reunião de planejamento', dates: [t], category: 'trabalho', done: false, alarm: true, created: Date.now() },
                { id: uid(), name: 'Estudar TypeScript', dates: [t], category: 'estudo', done: false, alarm: false, created: Date.now() },
                { id: uid(), name: 'Corrida matinal', dates: [t], category: 'exercício', done: true, alarm: true, created: Date.now() },
                { id: uid(), name: 'Ler 30 minutos', dates: [t], category: 'pessoal', done: false, alarm: false, created: Date.now() },
            ];
        }

        function loadAlarmsTriggered() {
            try {
                const saved = localStorage.getItem('agenda_alarms_triggered');
                if (saved) alarmsTriggered = JSON.parse(saved);
            } catch (e) {
                alarmsTriggered = {};
            }
        }

        function saveAlarmsTriggered() {
            try {
                localStorage.setItem('agenda_alarms_triggered', JSON.stringify(alarmsTriggered));
            } catch (e) {}
        }

        function showSaveIndicator() {
            const el = document.getElementById('saveIndicator');
            el.classList.add('show');
            clearTimeout(window._saveIndicatorTimeout);
            window._saveIndicatorTimeout = setTimeout(() => el.classList.remove('show'), 1500);
        }

        // ==================== FORMATAÇÃO ====================
        function fmtDate(ds) {
            if (!ds) return '';
            const [y, m, d] = ds.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            const td = today();
            const tmr = new Date();
            tmr.setDate(tmr.getDate() + 1);
            const yst = new Date();
            yst.setDate(yst.getDate() - 1);
            if (ds === td) return 'Hoje';
            if (ds === tmr.toISOString().split('T')[0]) return 'Amanhã';
            if (ds === yst.toISOString().split('T')[0]) return 'Ontem';
            return dt.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        }

        function fmtDates(arr) {
            return arr && arr.length ? arr.map(d => fmtDate(d)).join(', ') : '';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ==================== FILTROS ====================
        function getFilteredTasks() {
            if (!dateFilter) return [];
            return tasks
                .filter(t => t.dates && t.dates.includes(dateFilter))
                .sort((a, b) => b.created - a.created);
        }

        // ==================== RENDER ====================
        function renderTasks() {
            const list = document.getElementById('taskList');
            const f = getFilteredTasks();
            const td = today();
            const fi = document.getElementById('filterInfo');

            if (!dateFilter) {
                fi.classList.remove('show');
                list.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Toque em um dia no calendário</div></div>';
            } else if (!f.length) {
                fi.classList.add('show');
                document.getElementById('filterDateValue').textContent = fmtDate(dateFilter);
                list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nenhuma atividade para ${fmtDate(dateFilter).toLowerCase()}</div></div>`;
            } else {
                fi.classList.add('show');
                document.getElementById('filterDateValue').textContent = fmtDate(dateFilter);
                list.innerHTML = f.map(t => {
                    const datesStr = fmtDates(t.dates);
                    const isToday = t.dates && t.dates.includes(td) && !t.done;
                    return `<div class="task ${t.done ? 'done' : ''} ${isToday ? 'today-task' : ''}" data-id="${t.id}">
                        <div class="task-check" data-act="toggle" data-id="${t.id}">${t.done ? '✓' : ''}</div>
                        <div class="task-body" data-act="edit" data-id="${t.id}">
                            <div class="task-name">${t.alarm ? '🔔 ' : ''}${esc(t.name)}</div>
                            <div class="task-meta">
                                ${datesStr ? `<span class="date-highlight">📅 ${datesStr}</span>` : ''}
                                <span class="task-dot dot-${t.category}"></span> ${t.category.charAt(0).toUpperCase() + t.category.slice(1)}
                                ${t.dates && t.dates.length > 1 ? `<span style="color:var(--accent2);font-weight:600;">+${t.dates.length - 1}</span>` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="task-btn" data-act="edit" data-id="${t.id}">✏️</button>
                            <button class="task-btn del" data-act="delete" data-id="${t.id}">🗑️</button>
                        </div>
                    </div>`;
                }).join('');
            }
            updateStats();
            updateTodayAlert();
        }

        function updateStats() {
            const f = getFilteredTasks();
            const total = f.length;
            const done = f.filter(t => t.done).length;
            const pct = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressPct').textContent = pct + '%';
            const circ = 2 * Math.PI * 23;
            const fill = document.getElementById('progressFill');
            fill.style.strokeDasharray = circ;
            fill.style.strokeDashoffset = circ - (pct / 100) * circ;

            if (!dateFilter) {
                document.getElementById('progressTitle').textContent = 'Selecione uma data';
                document.getElementById('progressSub').textContent = 'Toque em um dia no calendário';
            } else if (!total) {
                document.getElementById('progressTitle').textContent = 'Nenhuma tarefa';
                document.getElementById('progressSub').textContent = 'Neste dia';
            } else if (done === total) {
                document.getElementById('progressTitle').textContent = 'Tudo concluído! 🎉';
                document.getElementById('progressSub').textContent = `${done}/${total} atividades feitas`;
            } else {
                document.getElementById('progressTitle').textContent = `${done} de ${total} concluídas`;
                document.getElementById('progressSub').textContent = `${total - done} pendentes`;
            }
        }

        function updateTodayAlert() {
            const td = today();
            const todayTasks = tasks.filter(t => t.dates && t.dates.includes(td) && !t.done);
            const alarmTasks = todayTasks.filter(t => t.alarm);
            const alert = document.getElementById('todayAlert');

            if (todayTasks.length > 0) {
                alert.classList.add('show');
                alert.classList.remove('all-done');
                document.getElementById('todayAlertIcon').textContent = '🔔';
                document.getElementById('todayAlertTitle').textContent = 'Atividades de hoje!';
                document.getElementById('todayAlertText').textContent = `${todayTasks.length} pendente(s) • ${alarmTasks.length} com alarme`;
                document.getElementById('todayAlertBadge').textContent = todayTasks.length;
                document.getElementById('todayAlertBtn').style.display = alarmTasks.length > 0 ? 'inline-block' : 'none';
            } else {
                alert.classList.add('show');
                alert.classList.add('all-done');
                document.getElementById('todayAlertIcon').textContent = '✅';
                document.getElementById('todayAlertTitle').textContent = 'Nada pendente hoje';
                document.getElementById('todayAlertText').textContent = 'Nenhuma atividade para hoje';
                document.getElementById('todayAlertBadge').textContent = '✓';
                document.getElementById('todayAlertBtn').style.display = 'none';
            }
        }

        function renderCalendar() {
            const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('calMonth').textContent = months[calMonth] + ' ' + calYear;
            document.getElementById('calWeekdays').innerHTML = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']
                .map(d => `<div class="calendar-weekday">${d}</div>`).join('');

            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysIn = new Date(calYear, calMonth + 1, 0).getDate();
            const daysPrev = new Date(calYear, calMonth, 0).getDate();
            const td = today();
            const taskDates = new Set();
            tasks.forEach(t => { if (t.dates) t.dates.forEach(d => taskDates.add(d)); });

            let h = '';
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysPrev - i;
                const m = calMonth === 0 ? 11 : calMonth - 1;
                const y = calMonth === 0 ? calYear - 1 : calYear;
                h += `<div class="calendar-date other" data-date="${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}">${day}</div>`;
            }
            for (let day = 1; day <= daysIn; day++) {
                const ds = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                let cls = 'calendar-date';
                if (ds === td) cls += ' today';
                if (ds === dateFilter) cls += ' selected';
                if (taskDates.has(ds)) cls += ' has-task';
                h += `<div class="${cls}" data-date="${ds}">${day}</div>`;
            }
            const total = firstDay + daysIn;
            const rem = total <= 35 ? 35 - total : 42 - total;
            for (let day = 1; day <= rem; day++) {
                const m = calMonth === 11 ? 0 : calMonth + 1;
                const y = calMonth === 11 ? calYear + 1 : calYear;
                h += `<div class="calendar-date other" data-date="${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}">${day}</div>`;
            }
            document.getElementById('calDates').innerHTML = h;
        }

        function renderMiniCal() {
            const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('miniCalMonth').textContent = months[miniMonth] + ' ' + miniYear;
            document.getElementById('miniCalDays').innerHTML = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']
                .map(d => `<div class="mini-cal-day">${d}</div>`).join('');

            const firstDay = new Date(miniYear, miniMonth, 1).getDay();
            const daysIn = new Date(miniYear, miniMonth + 1, 0).getDate();
            const daysPrev = new Date(miniYear, miniMonth, 0).getDate();
            const td = today();

            let h = '';
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysPrev - i;
                const m = miniMonth === 0 ? 11 : miniMonth - 1;
                const y = miniMonth === 0 ? miniYear - 1 : miniYear;
                h += `<div class="mini-cal-date other" data-date="${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}">${day}</div>`;
            }
            for (let day = 1; day <= daysIn; day++) {
                const ds = miniYear + '-' + String(miniMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                let cls = 'mini-cal-date';
                if (ds === td) cls += ' today';
                if (miniDates.includes(ds)) cls += ' sel';
                h += `<div class="${cls}" data-date="${ds}">${day}</div>`;
            }
            const total = firstDay + daysIn;
            const rem = total <= 35 ? 35 - total : 42 - total;
            for (let day = 1; day <= rem; day++) {
                const m = miniMonth === 11 ? 0 : miniMonth + 1;
                const y = miniMonth === 11 ? miniYear + 1 : miniYear;
                h += `<div class="mini-cal-date other" data-date="${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}">${day}</div>`;
            }
            document.getElementById('miniCalDates').innerHTML = h;
            updateMiniSel();
        }

        function updateMiniSel() {
            const el = document.getElementById('miniCalSelected');
            if (!miniDates.length) {
                el.innerHTML = '📅 Nenhum dia selecionado';
            } else if (miniDates.length <= 5) {
                el.innerHTML = miniDates.map(d =>
                    `<span class="mini-cal-tag">${fmtDate(d)} <span class="remove" data-date="${d}">✕</span></span>`
                ).join('');
            } else {
                el.innerHTML = `<span class="mini-cal-tag">${miniDates.length} dias selecionados</span>`;
            }
        }

        // ==================== AÇÕES ====================
        function calMove(d) {
            calMonth += d;
            if (calMonth > 11) { calMonth = 0; calYear++; } else if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        }

        function calSelect(ds) {
            dateFilter = ds;
            renderTasks();
            renderCalendar();
        }

        function clearFilter() {
            dateFilter = null;
            renderTasks();
            renderCalendar();
        }

        function miniToggle(ds) {
            const idx = miniDates.indexOf(ds);
            if (idx > -1) miniDates.splice(idx, 1);
            else miniDates.push(ds);
            miniDates.sort();
            renderMiniCal();
        }

        function miniRemove(ds) {
            miniDates = miniDates.filter(d => d !== ds);
            renderMiniCal();
        }

        function miniMove(d) {
            miniMonth += d;
            if (miniMonth > 11) { miniMonth = 0; miniYear++; } else if (miniMonth < 0) { miniMonth = 11; miniYear--; }
            renderMiniCal();
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.done = !t.done;
                saveTasks();
                renderTasks();
                renderCalendar();
                toast(t.done ? '✅ Concluída!' : '🔄 Reaberta');
            }
        }

        function deleteTask(id) {
            const before = tasks.length;
            tasks = tasks.filter(x => x.id !== id);
            if (tasks.length < before) {
                if (editId === id) closeModal();
                saveTasks();
                renderTasks();
                renderCalendar();
                toast('🗑️ Removida');
            }
        }

        function clearDone() {
            if (!dateFilter) {
                toast('ℹ️ Selecione uma data primeiro');
                return;
            }
            const ids = getFilteredTasks().filter(t => t.done).map(t => t.id);
            if (!ids.length) {
                toast('ℹ️ Nada para limpar');
                return;
            }
            tasks = tasks.filter(t => !ids.includes(t.id));
            saveTasks();
            renderTasks();
            renderCalendar();
            toast(`🧹 ${ids.length} removida(s)`);
        }

        // ==================== MODAL ====================
        function openModal(id) {
            const input = document.getElementById('inputName');
            if (id) {
                const t = tasks.find(x => x.id === id);
                if (!t) return;
                editId = id;
                document.getElementById('modalTitle').textContent = 'Editar Atividade';
                document.getElementById('editBadge').style.display = 'block';
                document.getElementById('btnSave').textContent = '💾 Atualizar';
                input.value = t.name;
                miniDates = [...(t.dates || [today()])];
                category = t.category;
                alarmEnabled = t.alarm || false;
                document.getElementById('alarmToggle').checked = alarmEnabled;
                if (miniDates.length) {
                    const [y, m] = miniDates[0].split('-');
                    miniYear = +y;
                    miniMonth = +m - 1;
                }
            } else {
                editId = null;
                document.getElementById('modalTitle').textContent = 'Nova Atividade';
                document.getElementById('editBadge').style.display = 'none';
                document.getElementById('btnSave').textContent = '💾 Salvar';
                input.value = '';
                miniDates = dateFilter ? [dateFilter] : [today()];
                category = 'trabalho';
                alarmEnabled = false;
                document.getElementById('alarmToggle').checked = false;
                const [y, m] = miniDates[0].split('-');
                miniYear = +y;
                miniMonth = +m - 1;
            }
            updateChips();
            renderMiniCal();
            document.getElementById('modalOverlay').classList.add('open');
            setTimeout(() => input.focus(), 400);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            editId = null;
            miniDates = [];
        }

        function setCategory(cat) {
            category = cat;
            updateChips();
        }

        function updateChips() {
            document.querySelectorAll('.chip').forEach(c => {
                c.classList.remove('active');
                if (c.dataset.cat === category) c.classList.add('active');
            });
        }

        function saveTask() {
            const input = document.getElementById('inputName');
            const name = input.value.trim();

            if (!name) {
                toast('⚠️ Digite o nome');
                input.focus();
                return;
            }
            if (!miniDates.length) {
                toast('⚠️ Selecione pelo menos um dia');
                return;
            }

            alarmEnabled = document.getElementById('alarmToggle').checked;

            if (editId) {
                const t = tasks.find(x => x.id === editId);
                if (t) {
                    t.name = name;
                    t.dates = [...miniDates];
                    t.category = category;
                    t.alarm = alarmEnabled;
                }
                toast('✅ Atualizada!');
            } else {
                tasks.push({
                    id: uid(),
                    name: name,
                    dates: [...miniDates],
                    category: category,
                    done: false,
                    alarm: alarmEnabled,
                    created: Date.now()
                });
                toast('✅ Adicionada!');
            }

            saveTasks();

            if (dateFilter && !miniDates.includes(dateFilter)) {
                dateFilter = miniDates[0];
                const [y, m] = miniDates[0].split('-');
                calYear = +y;
                calMonth = +m - 1;
            }

            renderTasks();
            renderCalendar();
            closeModal();
        }

        // ==================== ALARME ====================
        function triggerAlarmModal(alarmTasks, dateStr) {
            document.getElementById('alarmDate').textContent = '📅 ' + fmtDate(dateStr);
            document.getElementById('alarmTasks').innerHTML = alarmTasks.map(t => {
                const dotColor =
                    t.category === 'trabalho' ? 'var(--blue)' :
                    t.category === 'estudo' ? '#f07070' :
                    t.category === 'exercício' ? 'var(--green)' : 'var(--pink)';
                return `<div class="alarm-task-item">
                    <span class="alarm-task-dot" style="background:${dotColor}"></span>
                    ${esc(t.name)}
                </div>`;
            }).join('');
            document.getElementById('alarmModal').classList.add('open');
            playAlarmSound();
            sendBrowserNotification(alarmTasks);
        }

        function playAlarmSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 800;
                    osc.type = 'sine';
                    gain.gain.value = 0.3;
                    osc.start(ctx.currentTime + i * 0.4);
                    osc.stop(ctx.currentTime + i * 0.4 + 0.2);
                }
            } catch (e) {}
        }

        function sendBrowserNotification(alarmTasks) {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                const names = alarmTasks.map(t => t.name).join(', ');
                try {
                    const n = new Notification('⏰ Agenda do Allan - Alarmes!', {
                        body: `Você tem ${alarmTasks.length} atividade(s) com alarme: ${names}`,
                        icon: '📋',
                        tag: 'agenda-alarm',
                        requireInteraction: true
                    });
                    n.onclick = () => { window.focus();
                        n.close(); };
                    setTimeout(() => n.close(), 10000);
                } catch (e) {}
            } else if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function openAlarmModal() {
            const td = today();
            const alarmTasks = tasks.filter(t => t.dates && t.dates.includes(td) && !t.done && t.alarm);
            if (alarmTasks.length > 0) {
                triggerAlarmModal(alarmTasks, td);
            }
        }

        function dismissAlarm() {
            document.getElementById('alarmModal').classList.remove('open');
        }

        function checkAlarms() {
            const td = today();
            const alarmTasks = tasks.filter(t => t.dates && t.dates.includes(td) && !t.done && t.alarm);
            if (alarmTasks.length > 0 && !alarmsTriggered[td]) {
                triggerAlarmModal(alarmTasks, td);
                alarmsTriggered[td] = true;
                saveAlarmsTriggered();
                updateTodayAlert();
            }
        }

        // ==================== TOAST ====================
        let toastTimer;

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ==================== RELÓGIO ====================
        function updateClock() {
            const n = new Date();
            document.getElementById('clockTime').textContent =
                String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
            document.getElementById('clockSec').textContent = String(n.getSeconds()).padStart(2, '0');
        }

        function updateHeader() {
            document.getElementById('headerDate').textContent =
                new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        // ==================== EVENTOS ====================
        function bindEvents() {
            // Task list
            document.getElementById('taskList').addEventListener('click', function(e) {
                const btn = e.target.closest('[data-act]');
                if (!btn) return;
                e.stopPropagation();
                const act = btn.dataset.act;
                const id = btn.dataset.id;
                if (act === 'toggle') toggleTask(id);
                else if (act === 'edit') openModal(id);
                else if (act === 'delete') deleteTask(id);
            });

            // Calendar
            document.getElementById('calDates').addEventListener('click', function(e) {
                const d = e.target.closest('.calendar-date');
                if (!d) return;
                calSelect(d.dataset.date);
            });
            document.getElementById('calPrev').addEventListener('click', function(e) { e.preventDefault();
                calMove(-1); });
            document.getElementById('calNext').addEventListener('click', function(e) { e.preventDefault();
                calMove(1); });
            document.getElementById('clearFilterBtn').addEventListener('click', function(e) { e.preventDefault();
                clearFilter(); });

            // Today alert
            document.getElementById('todayAlert').addEventListener('click', function(e) {
                if (e.target.closest('.today-alert-btn')) return;
                dateFilter = today();
                renderTasks();
                renderCalendar();
            });
            document.getElementById('todayAlertBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                openAlarmModal();
            });

            // Mini calendar
            document.getElementById('miniCalDates').addEventListener('click', function(e) {
                const d = e.target.closest('.mini-cal-date');
                if (!d) return;
                e.stopPropagation();
                miniToggle(d.dataset.date);
            });
            document.getElementById('miniCalSelected').addEventListener('click', function(e) {
                const r = e.target.closest('.remove');
                if (!r) return;
                e.stopPropagation();
                miniRemove(r.dataset.date);
            });
            document.getElementById('miniCalPrev').addEventListener('click', function(e) { e.preventDefault();
                e.stopPropagation();
                miniMove(-1); });
            document.getElementById('miniCalNext').addEventListener('click', function(e) { e.preventDefault();
                e.stopPropagation();
                miniMove(1); });

            // Chips
            document.getElementById('chips').addEventListener('click', function(e) {
                const c = e.target.closest('.chip');
                if (!c) return;
                setCategory(c.dataset.cat);
            });

            // FAB
            document.getElementById('fab').addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('modalOverlay').classList.contains('open') ? closeModal() : openModal();
            });

            // Modal
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            document.getElementById('modalSheet').addEventListener('click', function(e) { e.stopPropagation(); });
            document.getElementById('btnCancel').addEventListener('click', function(e) { e.preventDefault();
                closeModal(); });
            document.getElementById('btnSave').addEventListener('click', function(e) { e.preventDefault();
                saveTask(); });

            // Clear done
            document.getElementById('clearDone').addEventListener('click', function(e) { e.preventDefault();
                clearDone(); });

            // Alarm modal
            document.getElementById('alarmDismiss').addEventListener('click', function() { dismissAlarm(); });
            document.getElementById('alarmModal').addEventListener('click', function(e) {
                if (e.target === this) dismissAlarm();
            });

            // Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (document.getElementById('alarmModal').classList.contains('open')) dismissAlarm();
                    else if (document.getElementById('modalOverlay').classList.contains('open')) closeModal();
                }
            });

            // Salvar antes de sair
            window.addEventListener('beforeunload', function() {
                saveTasks();
                saveAlarmsTriggered();
            });

            // Salvar quando a página ficar oculta
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    saveTasks();
                    saveAlarmsTriggered();
                }
            });
        }

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            console.log('🚀 Iniciando Agenda do Allan...');

            loadTasks();
            loadAlarmsTriggered();
            renderTasks();
            renderCalendar();
            updateHeader();
            updateClock();
            updateChips();
            updateTodayAlert();
            bindEvents();

            // Intervalos
            setInterval(updateClock, 1000);
            setInterval(saveTasks, 30000); // Salvar a cada 30 segundos
            setInterval(checkAlarms, 60000); // Verificar alarmes a cada minuto

            // Solicitar permissão de notificação
            if ('Notification' in window && Notification.permission === 'default') {
                setTimeout(() => Notification.requestPermission(), 3000);
            }

            console.log('✅ Agenda do Allan pronta!');
            console.log('💾 Chave de armazenamento: ' + STORAGE_KEY);
            console.log('📂 Total de tarefas: ' + tasks.length);
        }

        init();
    </script>
</body>
</html>
