<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Controle Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-blur: blur(16px);
            --card-border: rgba(255, 255, 255, 0.1);
            
            --primary: #06b6d4;
            --primary-hover: #0891b2;
            --success: #10b981;
            --danger: #f43f5e;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container 100% Mobile */
        .app-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header do App */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0f172a;
        }

        .user-info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Cards de Resumo */
        .summary-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .summary-card.highlight {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }

        .summary-card span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-card .value {
            font-size: 18px;
            font-weight: 700;
        }

        .summary-card.highlight .value {
            color: var(--success);
        }

        /* Formulário de Cadastro */
        .form-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        input#bill-name { flex: 1.8; width: 60%; }
        input#bill-value { flex: 1; width: 40%; }

        .btn-submit {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        /* Lista de Contas */
        .list-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: -8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bills-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bill-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bill-item:active {
            transform: scale(0.99);
        }

        .bill-item.selected {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.08);
        }

        .bill-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .bill-item.selected .custom-checkbox {
            border-color: var(--success);
            background: var(--success);
        }

        .custom-checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid #0f172a;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            display: none;
            margin-bottom: 2px;
        }

        .bill-item.selected .custom-checkbox::after {
            display: block;
        }

        .bill-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bill-name {
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .bill-item.selected .bill-name {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .bill-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bill-value {
            font-size: 15px;
            font-weight: 700;
        }

        /* Botões de Ação */
        .btn-edit {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit:hover {
            color: var(--primary);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 14px;
            border: 2px dashed var(--card-border);
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <div class="user-profile">
                <div class="avatar">M</div>
                <div class="user-info">
                    <h2>Meu Controle</h2>
                    <p>Banco de Dados Local ativo</p>
                </div>
            </div>
        </div>

        <div class="summary-container">
            <div class="summary-card">
                <span>Total Cadastrado</span>
                <div class="value" id="total-geral">R$ 0,00</div>
            </div>
            <div class="summary-card highlight">
                <span>Selecionado (A Pagar)</span>
                <div class="value" id="total-selecionado">R$ 0,00</div>
            </div>
        </div>

        <div class="form-card">
            <input type="hidden" id="bill-id"> <div class="form-row">
                <input type="text" id="bill-name" placeholder="Nome da conta..." autocomplete="off">
                <input type="number" id="bill-value" placeholder="R$ Valor" step="0.01" inputmode="decimal">
            </div>
            <button class="btn-submit" id="btn-action" onclick="handleSubmit()">+ Adicionar Conta</button>
        </div>

        <div class="list-section-title">Contas do Mês</div>
        <ul class="bills-list" id="bills-list">
            </ul>
    </div>

    <script>
        // CONFIGURAÇÃO DO BANCO DE DADOS (IndexedDB)
        let db;
        const request = indexedDB.open("FinanceAppDB", 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            db.createObjectStore("bills", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            readAllBills(); 
        };

        request.onerror = function() {
            console.error("Erro ao carregar o banco de dados.");
        };

        // FUNÇÃO PARA LER TODAS AS CONTAS DO BANCO
        function readAllBills() {
            const transaction = db.transaction(["bills"], "readonly");
            const objectStore = transaction.objectStore("bills");
            const requestAll = objectStore.getAll();

            requestAll.onsuccess = function() {
                renderList(requestAll.result);
            };
        }

        // REDERIZAR A LISTA NA TELA
        function renderList(bills) {
            const listElement = document.getElementById('bills-list');
            listElement.innerHTML = '';

            if (bills.length === 0) {
                listElement.innerHTML = '<div class="empty-state">Nenhuma conta cadastrada.<br>Adicione uma acima!</div>';
                document.getElementById('total-geral').innerText = 'R$ 0,00';
                document.getElementById('total-selecionado').innerText = 'R$ 0,00';
                return;
            }

            let totalGeral = 0;
            let totalSelecionado = 0;

            bills.forEach((bill) => {
                totalGeral += bill.value;
                if (bill.selected) {
                    totalSelecionado += bill.value;
                }

                const li = document.createElement('li');
                li.className = `bill-item ${bill.selected ? 'selected' : ''}`;
                li.setAttribute('onclick', `toggleSelect(${bill.id}, ${bill.selected}, event)`);

                li.innerHTML = `
                    <div class="bill-left">
                        <div class="custom-checkbox"></div>
                        <div class="bill-details">
                            <span class="bill-name">${bill.name}</span>
                        </div>
                    </div>
                    <div class="bill-right">
                        <span class="bill-value">R$ ${bill.value.toFixed(2).replace('.', ',')}</span>
                        <button class="btn-edit" onclick="startEdit(${bill.id}, '${bill.name}', ${bill.value}, event)">✏️</button>
                        <button class="btn-delete" onclick="deleteBill(${bill.id}, event)">&times;</button>
                    </div>
                `;

                listElement.appendChild(li);
            });

            document.getElementById('total-geral').innerText = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;
            document.getElementById('total-selecionado').innerText = `R$ ${totalSelecionado.toFixed(2).replace('.', ',')}`;
        }

        // CONTROLADOR DE ADIÇÃO OU ATUALIZAÇÃO
        function handleSubmit() {
            const idInput = document.getElementById('bill-id').value;
            const nameInput = document.getElementById('bill-name');
            const valueInput = document.getElementById('bill-value');

            const name = nameInput.value.trim();
            const value = parseFloat(valueInput.value);

            if (!name || isNaN(value) || value <= 0) {
                alert('Insira um nome e um valor válidos!');
                return;
            }

            const transaction = db.transaction(["bills"], "readwrite");
            const objectStore = transaction.objectStore("bills");

            if (idInput) {
                const id = parseInt(idInput);
                const getReq = objectStore.get(id);
                
                getReq.onsuccess = function() {
                    const data = getReq.result;
                    data.name = name;
                    data.value = value;
                    objectStore.put(data);
                };
            } else {
                objectStore.add({ name, value, selected: true });
            }

            transaction.oncomplete = function() {
                document.getElementById('bill-id').value = '';
                nameInput.value = '';
                valueInput.value = '';
                document.getElementById('btn-action').innerText = '+ Adicionar Conta';
                document.getElementById('btn-action').style.background = 'var(--primary)';
                document.activeElement.blur(); 
                readAllBills();
            };
        }

        // SELECIONAR / DESSELECIONAR CONTA
        function toggleSelect(id, currentStatus, event) {
            if (event.target.closest('.btn-delete') || event.target.closest('.btn-edit')) return;

            const transaction = db.transaction(["bills"], "readwrite");
            const objectStore = transaction.objectStore("bills");
            const requestGet = objectStore.get(id);

            requestGet.onsuccess = function() {
                const data = requestGet.result;
                data.selected = !currentStatus;
                objectStore.put(data);
            };

            transaction.oncomplete = function() {
                readAllBills();
            };
        }

        // INICIAR MODO EDIÇÃO
        function startEdit(id, name, value, event) {
            event.stopPropagation();
            
            document.getElementById('bill-id').value = id;
            document.getElementById('bill-name').value = name;
            document.getElementById('bill-value').value = value;
            
            const btn = document.getElementById('btn-action');
            btn.innerText = '💾 Salvar Alterações';
            btn.style.background = 'var(--success)';
            
            document.getElementById('bill-name').focus();
        }

        // DELETAR CONTA
        function deleteBill(id, event) {
            event.stopPropagation();
            const transaction = db.transaction(["bills"], "readwrite");
            const objectStore = transaction.objectStore("bills");
            objectStore.delete(id);

            transaction.oncomplete = function() {
                readAllBills();
            };
        }

        // Atalho Enter
        document.getElementById('bill-value').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
